<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Timetable</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <h2>Timetable</h2>
    <table border="1">
      <tr>
        <th>College</th>
        <th>Subjects</th>
        <th>Rooms</th>
        <th>Faculty</th>
        <th>Hours/Day</th>
      </tr>
      {% for row in rows %}
      <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
      </tr>
      {% endfor %}
    </table>
    <a href="/dashboard">Back to Dashboard</a>
  </body>
</html>
